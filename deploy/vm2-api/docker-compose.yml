version: '3.8'

services:
  api:
    build:
      context: ../../back_student
      dockerfile: Dockerfile
    container_name: cia_api
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      NODE_ENV: production
      DB_HOST: db.vm3.local
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-prod_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      LOG_LEVEL: info
    volumes:
      - ./logs:/usr/src/app/logs
    networks:
      - cia_network
    restart: always
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mysql:5.7
    container_name: cia_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-prod_db}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cia_network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:

networks:
  cia_network:
    driver: bridge
