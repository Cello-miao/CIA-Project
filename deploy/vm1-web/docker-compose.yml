version: '3.8'

services:
  web:
    image: nginx:1.25-alpine
    container_name: cia_web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - web_data:/usr/share/nginx/html
    networks:
      - cia_network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  web_data:

networks:
  cia_network:
    driver: bridge
