version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: cia_db_server
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-prod_db}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - cia_network
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  backup:
    image: mysql:5.7
    container_name: cia_db_backup
    volumes:
      - ./backups:/backups
      - db_data:/var/lib/mysql
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    networks:
      - cia_network
    restart: always

volumes:
  db_data:

networks:
  cia_network:
    driver: bridge
