version: '3.8'

services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: cia_gitlab
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "22:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.example.com'
        gitlab_rails['gitlab_shell_ssh_port'] = 22
        gitlab_rails['time_zone'] = 'UTC'
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    networks:
      - cia_network

  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: cia_runner
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_config:/etc/gitlab-runner
    networks:
      - cia_network
    depends_on:
      - gitlab

  portainer:
    image: portainer/portainer-ce:latest
    container_name: cia_portainer
    restart: always
    ports:
      - "8000:8000"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - cia_network

  registry:
    image: registry:2
    container_name: cia_registry
    restart: always
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: 'true'
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - cia_network

  prometheus:
    image: prom/prometheus:latest
    container_name: cia_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - cia_network

  grafana:
    image: grafana/grafana:latest
    container_name: cia_grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cia_network
    depends_on:
      - prometheus

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  runner_config:
  portainer_data:
  registry_data:
  prometheus_data:
  grafana_data:

networks:
  cia_network:
    driver: bridge
