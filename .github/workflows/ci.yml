# CIA Project — unified hardened DevSecOps CI/CD pipeline
# Phases 1–3: supply-chain audit, compile, Docker E2E, RBAC pentest (all PRs + pushes)
# Phases 4–5: GHCR image publish + Portainer/SSH deploy (main/master pushes only)
name: CIA Project Hardened DevSecOps CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: "Detect changed paths"
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.back }}
      frontend: ${{ steps.filter.outputs.front }}
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            back:
              - 'back_student/**'
            front:
              - 'front_student/**'

  security-and-quality:
    name: "Phase 1: Security Audit & Supply Chain Compliance"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front_student/package-lock.json

      - name: Verify Backend Supply Chain Integrity
        run: |
          cd back_student
          corepack enable
          yarn install --frozen-lockfile --ignore-scripts
          yarn audit --level high || npm audit --audit-level=high

      - name: Verify Frontend Supply Chain Integrity
        run: |
          cd front_student
          npm ci --ignore-scripts
          npm audit --audit-level=high

  backend_lint_test:
    name: "Phase 1b: Backend Lint & Tests"
    needs: detect_changes
    if: needs.detect_changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment (backend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: back_student/yarn.lock

      - name: Install dependencies (backend)
        run: |
          cd back_student
          corepack enable
          yarn install --frozen-lockfile --ignore-scripts

      - name: Typecheck (backend)
        run: yarn --cwd back_student build

      - name: Test (backend)
        run: yarn --cwd back_student test

  frontend_lint_test:
    name: "Phase 1b: Frontend Lint & Tests"
    needs: detect_changes
    if: needs.detect_changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front_student/package-lock.json

      - name: Install dependencies (frontend)
        run: npm ci --ignore-scripts
        working-directory: front_student

      - name: Test (frontend)
        working-directory: front_student
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm test -- --watchAll=false

  build-verification:
    name: "Phase 2: Compilations & Multi-Stage Production Bundling"
    needs:
      - security-and-quality
      - backend_lint_test
      - frontend_lint_test
    if: |
      always() &&
      needs.security-and-quality.result == 'success' &&
      (needs.backend_lint_test.result == 'success' || needs.backend_lint_test.result == 'skipped') &&
      (needs.frontend_lint_test.result == 'success' || needs.frontend_lint_test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Compile Backend Production Binary Artifacts
        run: |
          cd back_student
          corepack enable
          yarn install --frozen-lockfile --ignore-scripts
          yarn build
          rm -rf dist && cp -r build dist

      - name: Compile Frontend Distribution Static Bundle
        run: |
          cd front_student
          npm ci --ignore-scripts
          export REACT_APP_API_URL=http://localhost:3001
          npm run build

  e2e-integration-and-rbac:
    name: "Phase 3: Isolated Docker Orchestration & RBAC Pentesting"
    needs: build-verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Secure Environment Generation via GitHub Vault & Active Masking
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
        run: |
          echo "::add-mask::${MYSQL_ROOT_PASSWORD}"
          echo "::add-mask::${MYSQL_PASSWORD}"
          echo "::add-mask::${JWT_SECRET}"
          echo "::add-mask::${DEFAULT_ADMIN_PASSWORD}"

          cat > .env <<EOF
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=cia_db
          MYSQL_USER=cia_user
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          DB_PORT=3306
          API_INTERNAL_PORT=3001
          JWT_SECRET=${JWT_SECRET}
          BCRYPT_SALT_ROUNDS=10
          DEFAULT_ADMIN_USERNAME=admin
          DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
          DEFAULT_ADMIN_ROLE=ADMIN
          REACT_APP_API_URL=http://localhost:3001
          ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:8080
          SERVICE_USER_UID=1001
          SERVICE_USER_GID=1001
          WEB_HOST_PORT=8080
          EOF

          sed -i 's/^          //' .env

      - name: Prepare Backend Docker Build Context
        run: |
          cd back_student
          corepack enable
          yarn install --frozen-lockfile --ignore-scripts
          yarn build
          rm -rf dist && cp -r build dist

      - name: Spin Up Isolated Containers Topology
        run: |
          docker compose --env-file .env up --build -d
          echo "[INFO] Waiting for core services to become healthy..."
          for _ in $(seq 1 30); do
            DB=$(docker inspect -f '{{.State.Health.Status}}' cia-db 2>/dev/null || echo "starting")
            API=$(docker inspect -f '{{.State.Health.Status}}' cia-api 2>/dev/null || echo "starting")
            WEB=$(docker inspect -f '{{.State.Health.Status}}' cia-web 2>/dev/null || echo "starting")
            echo "[INFO] cia-db=$DB cia-api=$API cia-web=$WEB"
            if [ "$DB" = "healthy" ] && [ "$API" = "healthy" ] && [ "$WEB" = "healthy" ]; then
              docker compose ps
              break
            fi
            sleep 5
          done
          if [ "$DB" != "healthy" ] || [ "$API" != "healthy" ] || [ "$WEB" != "healthy" ]; then
            echo "[WARN] Timed out waiting for all healthchecks"
            docker compose ps
          fi

      - name: Run Certified Smoke-Test Execution Layer
        run: |
          chmod +x run_smoke_tests.sh
          ./run_smoke_tests.sh

      - name: Perform Offensive RBAC Privilege Escalation Testing
        run: |
          echo "[SECURITY AUDIT] Simulating automated token hijacking attack scenario..."

          curl -sS -X POST 'http://localhost:3001/auth/register' \
            -H 'Content-Type: application/json' \
            -d '{"username":"attacker_normal","password":"HackerPassword2026!"}'

          USER_TOKEN=$(curl -sS -X POST 'http://localhost:3001/auth/login' \
            -H 'Content-Type: application/json' \
            -d '{"username":"attacker_normal","password":"HackerPassword2026!"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          echo "::add-mask::$USER_TOKEN"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET 'http://localhost:3001/product/' \
            -H "auth: $USER_TOKEN")

          echo "Pentest Penetration Attempt HTTP Response: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "403" ]; then
            echo "[CRITICAL FAIL] Vulnerability Detected: RBAC gate bypassed. Regular users can extract admin endpoints!"
            exit 1
          else
            echo "[PASS] RBAC Shield working flawlessly. Security layer effectively blocked malicious user with 403 Forbidden."
          fi

      - name: Non-Negotiable Infrastructure Tear Down
        if: always()
        run: docker compose --env-file .env down -v

  build_backend:
    name: "Phase 4: Build & Push Backend Image (GHCR)"
    needs:
      - detect_changes
      - e2e-integration-and-rbac
      - backend_lint_test
    if: |
      github.event_name == 'push' &&
      needs.detect_changes.outputs.backend == 'true' &&
      needs.e2e-integration-and-rbac.result == 'success' &&
      (needs.backend_lint_test.result == 'success' || needs.backend_lint_test.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Prepare Backend Docker Build Context
        run: |
          cd back_student
          corepack enable
          yarn install --frozen-lockfile --ignore-scripts
          yarn build
          rm -rf dist && cp -r build dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./back_student
          file: ./back_student/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/back_student:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/back_student:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Set build backend image output
        id: set_image
        run: echo "image=ghcr.io/${{ github.repository_owner }}/back_student:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build_frontend:
    name: "Phase 4: Build & Push Frontend Image (GHCR)"
    needs:
      - detect_changes
      - e2e-integration-and-rbac
      - frontend_lint_test
    if: |
      github.event_name == 'push' &&
      needs.detect_changes.outputs.front == 'true' &&
      needs.e2e-integration-and-rbac.result == 'success' &&
      (needs.frontend_lint_test.result == 'success' || needs.frontend_lint_test.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./front_student
          file: ./front_student/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            REACT_APP_API_URL=http://localhost:3001
          tags: |
            ghcr.io/${{ github.repository_owner }}/front_student:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/front_student:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Set build frontend image output
        id: set_image
        run: echo "image=ghcr.io/${{ github.repository_owner }}/front_student:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: "Phase 5: Production Deploy (Portainer or SSH)"
    needs:
      - build_backend
      - build_frontend
    if: |
      github.event_name == 'push' &&
      (
        (needs.build_backend.result == 'success' && needs.build_backend.outputs.image != '') ||
        (needs.build_frontend.result == 'success' && needs.build_frontend.outputs.image != '')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Prepare list of images to deploy
        id: prepare
        run: |
          IMAGES=""
          if [ "${{ needs.build_backend.outputs.image }}" != "" ]; then
            IMAGES="$IMAGES ${{ needs.build_backend.outputs.image }}"
          fi
          if [ "${{ needs.build_frontend.outputs.image }}" != "" ]; then
            IMAGES="$IMAGES ${{ needs.build_frontend.outputs.image }}"
          fi
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

      - name: Resolve deployment method
        id: deploy_method
        env:
          PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK }}
        run: |
          if [ -n "${PORTAINER_WEBHOOK}" ]; then
            echo "method=portainer" >> "$GITHUB_OUTPUT"
          else
            echo "method=ssh" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Portainer webhook(s)
        if: steps.deploy_method.outputs.method == 'portainer'
        env:
          PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK }}
          IMAGES: ${{ steps.prepare.outputs.images }}
        run: |
          echo "Calling Portainer webhook to update with images: $IMAGES"
          curl -sfSL -X POST "$PORTAINER_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"images\":\"$IMAGES\"}" \
            || (echo "Portainer webhook call failed" && exit 1)

      - name: Deploy via SSH to host (fallback)
        if: steps.deploy_method.outputs.method == 'ssh'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            echo "Deploy triggered by GitHub Actions for images: ${{ steps.prepare.outputs.images }}"
            for IMG in ${{ steps.prepare.outputs.images }}; do
              echo "Pulling $IMG"
              docker pull "$IMG"
            done
            for SRV in back_student front_student; do
              if docker ps -a --format '{{.Names}}' | grep -q "^${SRV}$"; then
                echo "Restarting container $SRV"
                docker stop "$SRV" || true
                docker rm "$SRV" || true
                docker run -d --name "$SRV" --restart unless-stopped "$IMG"
              else
                echo "Container $SRV not present on host; skipping restart"
              fi
            done
