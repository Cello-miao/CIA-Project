# CI/CD pipeline: tests, build, push to GHCR, and deploy
# - Detects changed paths and runs only relevant jobs (backend/front)
# - Lints and tests both projects with caching
# - Builds multi-stage Docker images and pushes to GHCR (tags: sha & latest)
# - Deploys via Portainer webhook (if provided) or SSH to a deployment host
#
# Checklist (what this workflow does):
# 1) Detect changed paths (back_student/** and front_student/**)
# 2) Run lint & tests for changed projects
# 3) Build and push Docker images for changed projects to GHCR
# 4) Deploy images to production using Portainer webhook or SSH
#
# Permissions: allow writing to packages so GHCR pushes work
permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    # We still fetch all pushes but path-filter will detect which jobs should run.
    paths:
      - 'back_student/**'
      - 'front_student/**'
  workflow_dispatch: {}

jobs:
  # 1) Detect changed paths once and expose as job outputs
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.back }}
      frontend: ${{ steps.filter.outputs.front }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            back:
              - 'back_student/**'
            front:
              - 'front_student/**'

  # 2) Backend: lint & tests (runs only if backend files changed)
  backend_lint_test:
    needs: detect_changes
    if: needs.detect_changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 16 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'yarn'

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: |
            back_student/node_modules
            ~/.cache/yarn
          key: ${{ runner.os }}-back-node-${{ hashFiles('back_student/yarn.lock') }}

      - name: Install dependencies (backend)
        run: yarn --cwd back_student install --frozen-lockfile

      - name: Lint (backend)
        run: |
          yarn --cwd back_student lint

      - name: Test (backend)
        run: |
          yarn --cwd back_student test

  # 3) Frontend: tests (runs only if frontend files changed)
  frontend_lint_test:
    needs: detect_changes
    if: needs.detect_changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 16 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'yarn'

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: |
            front_student/node_modules
            ~/.cache/yarn
          key: ${{ runner.os }}-front-node-${{ hashFiles('front_student/yarn.lock') }}

      - name: Install dependencies (frontend)
        run: yarn --cwd front_student install --frozen-lockfile

      - name: Test (frontend)
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          yarn --cwd front_student test --watchAll=false

  # 4) Build & push backend image to GHCR (runs only if backend changed and tests passed)
  build_backend:
    needs: [detect_changes, backend_lint_test]
    if: needs.detect_changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push backend image (multi-stage)
        id: build-backend
        uses: docker/build-push-action@v4
        with:
          context: ./back_student
          file: ./back_student/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/back_student:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/back_student:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Set build backend image output
        id: set_image
        run: |
          echo "image=ghcr.io/${{ github.repository_owner }}/back_student:${{ github.sha }}" >> $GITHUB_OUTPUT

  # 5) Build & push frontend image to GHCR (runs only if frontend changed and tests passed)
  build_frontend:
    needs: [detect_changes, frontend_lint_test]
    if: needs.detect_changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push frontend image (multi-stage)
        id: build-frontend
        uses: docker/build-push-action@v4
        with:
          context: ./front_student
          file: ./front_student/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/front_student:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/front_student:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Set build frontend image output
        id: set_image
        run: |
          echo "image=ghcr.io/${{ github.repository_owner }}/front_student:${{ github.sha }}" >> $GITHUB_OUTPUT

  # 6) Deploy: only run if at least one build job ran successfully
  deploy:
    needs: [build_backend, build_frontend]
    runs-on: ubuntu-latest
    if: ${{ (needs.build_backend.result == 'success' && needs.build_backend.outputs.image != '') || (needs.build_frontend.result == 'success' && needs.build_frontend.outputs.image != '') }}
    steps:
      - name: Prepare list of images to deploy
        id: prepare
        run: |
          IMAGES=""
          if [ "${{ needs.build_backend.outputs.image }}" != "" ]; then
            IMAGES="$IMAGES ${{ needs.build_backend.outputs.image }}"
          fi
          if [ "${{ needs.build_frontend.outputs.image }}" != "" ]; then
            IMAGES="$IMAGES ${{ needs.build_frontend.outputs.image }}"
          fi
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

      # Option A: Portainer webhook (preferred if available)
      - name: Trigger Portainer webhook(s)
        if: ${{ secrets.PORTAINER_WEBHOOK != '' }}
        env:
          PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK }}
          IMAGES: ${{ steps.prepare.outputs.images }}
        run: |
          # Portainer webhook should be configured to trigger a stack update
          echo "Calling Portainer webhook to update with images: $IMAGES"
          curl -sfSL -X POST "$PORTAINER_WEBHOOK" -H "Content-Type: application/json" -d "{\"images\":\"$IMAGES\"}" || (echo 'Portainer webhook call failed' && exit 1)

      # Option B: SSH-based deploy (fallback)
      - name: Deploy via SSH to host (fallback)
        if: ${{ secrets.PORTAINER_WEBHOOK == '' }}
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            echo "Deploy triggered by GitHub Actions for images: ${{ steps.prepare.outputs.images }}"
            for IMG in ${{ steps.prepare.outputs.images }}; do
              echo "Pulling $IMG"
              # Assumes the local host user has rights to run docker commands (belongs to docker group)
              docker pull "$IMG"
            done
            # Example restart logic (adapt to your environment):
            # If you use docker-compose, you might do a `docker-compose pull` + `docker-compose up -d` for the affected services.
            # Here we attempt to restart named containers 'back_student' and 'front_student' if they exist.
            for SRV in back_student front_student; do
              if docker ps -a --format '{{.Names}}' | grep -q "^$SRV$"; then
                echo "Restarting container $SRV"
                docker stop "$SRV" || true
                docker rm "$SRV" || true
                # Recreate container using latest image; assumes the image uses proper non-root user and internal ports are same.
                docker run -d --name "$SRV" --restart unless-stopped "$IMG"
              else
                echo "Container $SRV not present on host; skipping restart (create it manually or via compose)"
              fi
            done

# -------------------------------------------------------------------------
# Operations & artifacts documentation (short blueprint)
#
# .env.production template (store this on host as file /opt/app/.env.production or in your secrets manager):
#
#   # Basic template - DO NOT bake secrets into images. Images should only contain application code and build-time config.
#   # Runtime secrets (DB credentials, API keys, OAuth secrets, etc.) must be injected at runtime from the host or orchestrator.
#   NODE_ENV=production
#   PORT=3001
#   DATABASE_URL=postgres://DB_USER:DB_PASS@db-host:5432/dbname
#   JWT_SECRET=${JWT_SECRET}
#   SENTRY_DSN=${SENTRY_DSN}
#   # Add third-party secrets here; keep them out of repo and GHCR images.
#
# Operational flow (concise log of events):
# 1) Developer pushes code to repo (push triggers this workflow when files under back_student/** or front_student/** change).
# 2) detect_changes determines which project(s) changed.
# 3) For each changed project, run lint and tests. If tests fail, pipeline stops and CI reports failure.
# 4) If tests pass, build multi-arch production Docker images (multi-stage, non-root user) and push to GHCR with tags:
#      - ghcr.io/<org_or_user>/back_student:<full_sha>
#      - ghcr.io/<org_or_user>/back_student:latest
#      - ghcr.io/<org_or_user>/front_student:<full_sha>
#      - ghcr.io/<org_or_user>/front_student:latest
# 5) On successful push, deployment job runs and either:
#      - Calls a Portainer webhook to trigger a stack update (recommended), or
#      - SSHs into the production host to pull images and restart containers (fallback). The host must have
#        the corresponding runtime .env.production and any secrets mounted or available via secret manager.
# 6) Production host pulls the new images (no source code present on host) and restarts app containers.
#
# Notes / Recommendations:
# - Create repository secrets:
#     - GITHUB_TOKEN (automatically provided by GitHub Actions; ensure repo-level permissions include packages: write)
#     - PORTAINER_WEBHOOK (URL) OR PRODUCTION_SSH_KEY, PRODUCTION_HOST, PRODUCTION_SSH_USER, PRODUCTION_SSH_PORT
# - Ensure production runtime uses non-root service user (container images must be built to run as non-root, e.g., 'service-web').
# - Keep .env.production on host or in a secrets manager; do NOT bake runtime secrets into images.
# - For stronger security, consider using GitHub OIDC and short-lived tokens instead of long-lived SSH keys.
# -------------------------------------------------------------------------

