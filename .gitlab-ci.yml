image: node:16

stages:
  - build
  - test
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

before_script:
  - echo "Starting CI/CD Pipeline"

build:backend:
  stage: build
  script:
    - cd back_student
    - npm install
    - npm run build
  artifacts:
    paths:
      - back_student/dist/
  only:
    - master
    - main

build:frontend:
  stage: build
  script:
    - cd front_student
    - npm install
    - npm run build
  artifacts:
    paths:
      - front_student/build/
  only:
    - master
    - main

test:backend:
  stage: test
  script:
    - cd back_student
    - npm install
    - npm test
  only:
    - merge_requests
    - master

test:frontend:
  stage: test
  script:
    - cd front_student
    - npm install
    - npm test
  only:
    - merge_requests
    - master

deploy:staging:
  stage: deploy
  script:
    - echo "Deploying to staging..."
    - ./scripts/build.sh
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop
  when: manual

deploy:production:
  stage: deploy
  script:
    - echo "Deploying to production..."
    - ./scripts/build.sh
  environment:
    name: production
    url: https://example.com
  only:
    - master
    - main
  when: manual
